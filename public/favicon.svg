<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <rect id="bg-shape" width="100" height="100" rx="24"/>

    <radialGradient id="auroraPink" cx="0%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="auroraCyan" cx="100%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="auroraPurple" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.7"/>
    </filter>

    <radialGradient id="spherePink" cx="30%" cy="30%" r="70%" fx="25%" fy="25%">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="20%" stop-color="#db2777"/>
      <stop offset="80%" stop-color="#831843"/>
      <stop offset="100%" stop-color="#4c0519"/>
    </radialGradient>

    <radialGradient id="sphereCyan" cx="30%" cy="30%" r="70%" fx="25%" fy="25%">
      <stop offset="0%" stop-color="#cffafe"/>
      <stop offset="20%" stop-color="#0891b2"/>
      <stop offset="80%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#082f49"/>
    </radialGradient>

    <linearGradient id="ringNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <use href="#bg-shape" fill="#020617"/> <use href="#bg-shape" fill="url(#auroraPink)"/>
  <use href="#bg-shape" fill="url(#auroraCyan)"/>
  <use href="#bg-shape" fill="url(#auroraPurple)"/>
  
  <rect x="1" y="1" width="98" height="98" rx="23" fill="none" stroke="url(#glassBorder)" stroke-width="1.5"/>

  <g filter="url(#shadow)">
    
    <g fill="none" stroke="url(#ringNeon)" stroke-width="2" stroke-linecap="round">
      <ellipse cx="50" cy="50" rx="36" ry="10" transform="rotate(30 50 50)" />
      <ellipse cx="50" cy="50" rx="36" ry="10" transform="rotate(90 50 50)" />
      <ellipse cx="50" cy="50" rx="36" ry="10" transform="rotate(150 50 50)" />
    </g>

    <circle cx="43" cy="45" r="4.5" fill="url(#sphereCyan)" />
    <circle cx="57" cy="45" r="4.5" fill="url(#spherePink)" />
    <circle cx="50" cy="56" r="4.5" fill="url(#sphereCyan)" />
    
    <circle cx="45" cy="52" r="5" fill="url(#spherePink)" />
    <circle cx="55" cy="52" r="5" fill="url(#sphereCyan)" />
    <circle cx="50" cy="42" r="5" fill="url(#spherePink)" />

    <circle cx="50" cy="48" r="6" fill="url(#sphereCyan)" />
    
    <ellipse cx="48" cy="45" rx="1.5" ry="0.8" fill="#ffffff" transform="rotate(-30 48 45)" />
    <ellipse cx="44" cy="50" rx="1" ry="0.6" fill="#ffffff" transform="rotate(-30 44 50)" />
    <ellipse cx="53" cy="40" rx="1" ry="0.6" fill="#ffffff" transform="rotate(-30 53 40)" />

    <circle cx="19" cy="32" r="3.5" fill="url(#spherePink)" />
    <circle cx="50" cy="14" r="3.5" fill="url(#sphereCyan)" />
    <circle cx="81" cy="68" r="3.5" fill="url(#spherePink)" />
    
    <circle cx="18" cy="31" r="1" fill="#ffffff" />
    <circle cx="49" cy="13" r="1" fill="#ffffff" />
    <circle cx="80" cy="67" r="1" fill="#ffffff" />
  </g>
</svg>
